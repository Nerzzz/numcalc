<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Numcalc</title>
        <script src="./script.js"></script>
        <link rel="stylesheet" href="index.css">
        <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon">
    </head>
    <body>
        <main>
            <div class="header">
                <a href="https://github.com/Nerzzz/num-calc" target="_blank">NUMCALC</a>
            </div>
            <section class="input_config">
                <header><h1>Entrada/saída</h1><div class="deco"></div></header>
                <div class="op">
                    <div class="in_type">
                        <span>Base de entrada:</span>
                        <select name="" id="inBase" oninput="calculate()">
                            <option value="2">Binário</option>
                            <option value="8">Octal</option>
                            <option value="10" selected>Decimal</option>
                            <option value="16">Hexadecimal</option>
                        </select>
                    </div>
                    <div class="out_type">
                        <span>Base de saída:</span>
                        <select name="" id="outBase" oninput="calculate()">
                            <option value="2">Binário</option>
                            <option value="8">Octal</option>
                            <option value="10">Decimal</option>
                            <option value="16">Hexadecimal</option>
                        </select>
                    </div>
                </div>
            </section>
            <section class="main_content">
                <header><h1>Calculadora</h1><div class="deco"></div></header>
                <div class="input_zone">
                    <label for="inValue">Entrada:</label>
                    <input type="text" id="inValue" autofocus oninput="calculate()">
                </div>
                <div class="out_zone">
                    <input type="text" id="outValue" readonly value="Esperando entrada...">
                    <button class="out_copy" title="Copiar saída" onclick="copyOutput()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-clipboard"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17.997 4.17a3 3 0 0 1 2.003 2.83v12a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-12a3 3 0 0 1 2.003 -2.83a4 4 0 0 0 3.997 3.83h4a4 4 0 0 0 3.98 -3.597zm-3.997 -2.17a2 2 0 1 1 0 4h-4a2 2 0 1 1 0 -4z" /></svg>
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <p>Feito por <a href="https://github.com/Nerzzz/num-calc" target="_blank">Guilherme</a></p>
        </footer>
    </body>
</html>
